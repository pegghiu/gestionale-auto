<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- ═══ NO-CACHE: forza fetch fresco dell'HTML ad ogni apertura ═══ -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Documenti</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#E85A00;--accent-d:#C04800;--accent-l:#FFF3EC;
  --dark:#1A1A1A;--surface:#FFF;--bg:#EDEBE6;
  --border:#DEDAD4;--border-dk:#C4C0B8;
  --text:#1A1A1A;--text-m:#706C65;--text-l:#9A9690;
  --ok:#1F7A35;--ok-bg:#E6F5EB;
  --warn:#7A5000;--warn-bg:#FFF8E6;
  --err:#B82020;--err-bg:#FDECEC;
  --info:#1A4FAA;--info-bg:#EBF0FD;
  --purple:#534AB7;--purple-l:#EEEDFE;
  --r:8px;--rs:5px;--sh:0 1px 3px rgba(0,0,0,.07)
}
body{font-family:'Helvetica Neue',Arial,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.5;min-height:100vh}

.hdr{background:var(--dark);color:#FFF;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100}
.hdr-l{display:flex;align-items:center;gap:20px}
.brand{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.hdr-title{font-size:15px;font-weight:600}
.btn-back{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:5px 12px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-back:hover{background:rgba(255,255,255,.08);color:#FFF}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn-p{background:var(--accent);color:#FFF;border-color:var(--accent)}
.btn-p:hover{background:var(--accent-d)}
.btn-s{background:#FFF;color:var(--text);border-color:var(--border)}
.btn-s:hover{background:var(--bg)}
.btn-sm{padding:5px 10px;font-size:12px}

.page{max-width:1240px;margin:0 auto;padding:20px 16px 60px}

/* FILTRI */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.toolbar select,.toolbar input{padding:7px 11px;border:1px solid var(--border);border-radius:var(--rs);font-size:15px;font-family:inherit;background:#FFF;color:var(--text);outline:none}
.toolbar select:focus,.toolbar input:focus{border-color:var(--accent)}
.toolbar input[type=text]{width:240px}

/* KPI MINI */
.kpi-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.kpi-mini{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 16px;box-shadow:var(--sh);display:flex;flex-direction:column;gap:2px;min-width:120px}
.kpi-mini-val{font-size:20px;font-weight:800;letter-spacing:-.02em}
.kpi-mini-lbl{font-size:10px;color:var(--text-m);font-weight:600;text-transform:uppercase;letter-spacing:.06em}

/* LISTA DOCUMENTI */
.doc-row{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--sh);margin-bottom:8px;
  display:grid;
  grid-template-columns: 92px 122px 1fr 92px 140px 118px 100px 100px 56px;
  align-items:stretch;gap:0;
  cursor:pointer;transition:box-shadow .15s,transform .12s;
  text-decoration:none;color:inherit;overflow:hidden;
}
.doc-row .dc-cell{ min-width:0; display:flex; flex-direction:column; justify-content:center; }
.dc-numdoc-bold{ font-family:monospace; font-size:15px; font-weight:900; letter-spacing:.04em; white-space:nowrap; }
.dc-data-short{ font-family:monospace; font-size:15px; font-weight:700; }
.doc-row:not(.header) .dc-cliente{
  font-weight:500; font-size:14px;
  white-space:normal; overflow:hidden;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical;
  line-height:1.25;
}
.doc-row:not(.header) .dc-targa{ font-size:16px; font-weight:900; }
.doc-row:not(.header) .dc-tot{ font-size:15px; font-weight:800; }
.doc-row:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px)}
.doc-row.header{
  background:#F7F6F3;cursor:default;font-size:10px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;color:var(--text-m);
  transform:none;box-shadow:none;border-bottom:2px solid var(--border-dk);
  border-radius:var(--r) var(--r) 0 0;margin-bottom:0;
}
.doc-row.header:hover{box-shadow:none;transform:none}
.dc-cell{padding:11px 14px;border-right:1px solid #F0EDE8}
.dc-cell:last-child{border-right:none}
.doc-row.header .dc-cell{padding:9px 14px}

.dc-targa{font-weight:800;letter-spacing:.1em;font-size:15px}
.dc-tot{font-weight:700;font-size:15px;font-variant-numeric:tabular-nums;text-align:right}
.dc-scontrino{font-family:monospace;font-size:13px;font-weight:700}
.dc-scontrino.vuoto{color:var(--text-l);font-weight:400}

/* BADGE TIPO */
.tipo-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:800;letter-spacing:.04em;font-family:monospace}

/* BADGE STATO */
.stato-dot{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600}
.stato-dot::before{content:'';width:7px;height:7px;border-radius:50%;flex-shrink:0}
.s-bozza::before{background:#9A9690}
.s-coda::before{background:var(--info)}
.s-stampa::before{background:var(--accent)}
.s-emesso::before{background:var(--ok)}
.s-errore::before{background:var(--err)}
.s-annullato::before{background:var(--text-l)}
.s-annullato{text-decoration:line-through;color:var(--text-l)}

.empty-state{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:48px;text-align:center;color:var(--text-l)}
.empty-state-icon{font-size:36px;margin-bottom:12px}
.empty-state-title{font-size:15px;font-weight:600;color:var(--text-m);margin-bottom:6px}
.empty-state-sub{font-size:13px}

.toasts{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:300}
.toast{background:var(--dark);color:#FFF;padding:10px 16px;border-radius:var(--r);font-size:15px;animation:fadeUp .22s ease;transition:opacity .3s}
.toast.ok{background:var(--ok)}
.toast.err{background:var(--err)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:860px){
  .doc-row{grid-template-columns:1fr 1fr;border-radius:var(--r)}
  .dc-cell{border-right:none;border-bottom:1px solid #F0EDE8}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l">
    <span class="brand">Gestione Veicoli</span>
    <span class="hdr-title">Documenti</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <a id="btnNuovoDoc" href="documento.html?nuovo=1" class="btn btn-p">+ Nuovo documento</a>
    <button class="btn-back" onclick="location.href='index.html'">← Menu</button>
  </div>
</header>

<div class="page">

  <!-- TOOLBAR -->
  <div class="toolbar">
    <input type="text" id="cerca" placeholder="Cerca n°, cliente, targa, scontrino..." oninput="filtra()">
    <select id="fStato" onchange="filtra()"><option value="">Tutti gli stati</option></select>
    <select id="fTipo" onchange="filtra()"><option value="">Tutti i tipi</option></select>
    <span id="risultati" style="font-size:12px;color:var(--text-m);margin-left:auto"></span>
  </div>

  <!-- KPI -->
  <div class="kpi-row">
    <div class="kpi-mini"><div class="kpi-mini-val" id="kTot">—</div><div class="kpi-mini-lbl">Totali</div></div>
    <div class="kpi-mini"><div class="kpi-mini-val" style="color:var(--ok)" id="kEmessi">—</div><div class="kpi-mini-lbl">Emessi</div></div>
    <div class="kpi-mini"><div class="kpi-mini-val" style="color:var(--info)" id="kDaEmettere">—</div><div class="kpi-mini-lbl">Da emettere</div></div>
    <div class="kpi-mini"><div class="kpi-mini-val" style="color:var(--err)" id="kErrori">—</div><div class="kpi-mini-lbl">Errori stampa</div></div>
    <div class="kpi-mini"><div class="kpi-mini-val" style="color:var(--accent)" id="kIncassato">—</div><div class="kpi-mini-lbl">Tot. emesso</div></div>
  </div>

  <!-- LISTA -->
  <div id="listaDoc"></div>

</div>

<div class="toasts" id="toasts"></div>

<script>
const SUPABASE_URL = 'https://iztrrgqkzsovorcmixum.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6dHJyZ3FrenNvdm9yY21peHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDI3NzMsImV4cCI6MjA4OTc3ODc3M30.3IyUCDpFs9x_iSi5C4asodt5_O3F_cwgdb3eBkoQh3U';
const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
/* === AUTH GUARD — login condiviso (sicurezza, NON rimuovere) === */
(function(){
  _sb.auth.getSession().then(function(r){
    if(!r.data || !r.data.session){
      var next = encodeURIComponent(location.pathname.split('/').pop() + location.search);
      location.replace('login.html?next=' + next);
    }
  });
  _sb.auth.onAuthStateChange(function(ev){
    if(ev === 'SIGNED_OUT') location.replace('login.html');
  });
})();

// ═══ CACHE BUSTER ═══════════════════════════════════════════
const _CB = Date.now();
function urlDoc(params = ''){
  const sep = params ? '&' : '';
  return `documento.html?${params}${sep}_v=${_CB}`;
}

const LS_KEY = 'gestionale_documenti'; // fallback locale

// Etichette/colori tipo documento (fallback grazioso per valori non mappati)
const TIPI_DOC = {
  'fattura':      { label:'Fattura',      col:'#1A4FAA', bg:'#EBF0FD' },
  'scontrino':    { label:'Scontrino',    col:'#1F7A35', bg:'#E6F5EB' },
  'dc':           { label:'Doc. comm.',   col:'#1F7A35', bg:'#E6F5EB' },
  'dcf':          { label:'Doc. comm.',   col:'#1F7A35', bg:'#E6F5EB' },
  'ricevuta':     { label:'Ricevuta',     col:'#854F0B', bg:'#FAEEDA' },
  'nota_credito': { label:'Nota credito', col:'#B82020', bg:'#FDECEC' },
  'preventivo':   { label:'Preventivo',   col:'#534AB7', bg:'#EEEDFE' },
};
function tipoInfo(t){
  const k = String(t||'').toLowerCase();
  return TIPI_DOC[k] || { label:(t||'—'), col:'#706C65', bg:'#F0EDE8' };
}
function prettyStato(s){
  if(!s) return '';
  return String(s).replace(/_/g,' ').replace(/\b\w/g, c=>c.toUpperCase());
}
// Stato robusto: deriva la classe colore dai timestamp (affidabili),
// usa la colonna `stato` per l'etichetta quando presente.
function statoInfo(d){
  const s = String(d.stato||'').toLowerCase();
  if(d.annullato_at || s.includes('annull'))
    return { label: prettyStato(d.stato)||'Annullato', cls:'s-annullato' };
  if(d.print_error || s.includes('error'))
    return { label: prettyStato(d.stato)||'Errore', cls:'s-errore' };
  if(d.emesso_at || d.numero_scontrino_fiscale || s.includes('emess') || s.includes('stamp'))
    return { label: prettyStato(d.stato)||'Emesso', cls:'s-emesso' };
  if(d.print_started_at || s.includes('coda') || s.includes('attesa'))
    return { label: prettyStato(d.stato)||'In coda', cls:'s-coda' };
  return { label: prettyStato(d.stato)||'Bozza', cls:'s-bozza' };
}
const isEmesso    = d => !!(d.emesso_at || d.numero_scontrino_fiscale) && !d.annullato_at;
const isAnnullato = d => !!d.annullato_at;
const isErrore    = d => !!d.print_error && !d.annullato_at && !isEmesso(d);

let TUTTI = [];
let _filtrati = [];

async function init(){
  const a1 = document.getElementById('btnNuovoDoc');
  if (a1) a1.href = urlDoc('nuovo=1');
  await caricaDaSupabase();
  popolaFiltri();
  filtra();
}

async function caricaDaSupabase(){
  try {
    const { data, error } = await _sb
      .from('documenti')
      .select('*')
      .order('data', { ascending:false })
      .order('ora',  { ascending:false, nullsFirst:false });
    if(error) throw error;
    TUTTI = (data||[]);
  } catch(e){
    console.warn('Supabase non disponibile, uso localStorage:', e.message);
    try { TUTTI = JSON.parse(localStorage.getItem(LS_KEY)||'[]'); } catch { TUTTI = []; }
  }
}

function popolaFiltri(){
  const stati = [...new Set(TUTTI.map(d=>d.stato).filter(Boolean))].sort();
  const tipi  = [...new Set(TUTTI.map(d=>d.tipo).filter(Boolean))].sort();
  const selS = document.getElementById('fStato');
  const selT = document.getElementById('fTipo');
  stati.forEach(s=>{ const o=document.createElement('option'); o.value=s; o.textContent=prettyStato(s); selS.appendChild(o); });
  tipi.forEach(t=>{ const o=document.createElement('option'); o.value=t; o.textContent=tipoInfo(t).label; selT.appendChild(o); });
}

function filtra(){
  const q     = document.getElementById('cerca').value.toLowerCase();
  const stato = document.getElementById('fStato').value;
  const tipo  = document.getElementById('fTipo').value;

  _filtrati = TUTTI.filter(d=>{
    if(stato && d.stato!==stato) return false;
    if(tipo && d.tipo!==tipo) return false;
    if(q){
      const blob = [d.numero,d.cliente_nome,d.veicolo_targa,d.veicolo_modello,
                    d.numero_scontrino_fiscale,d.cliente_piva,d.cliente_cf]
                   .join(' ').toLowerCase();
      if(!blob.includes(q)) return false;
    }
    return true;
  });

  renderKpi();
  renderLista();
}

function renderKpi(){
  document.getElementById('kTot').textContent       = TUTTI.length;
  document.getElementById('kEmessi').textContent    = TUTTI.filter(isEmesso).length;
  document.getElementById('kErrori').textContent    = TUTTI.filter(isErrore).length;
  document.getElementById('kDaEmettere').textContent= TUTTI.filter(d=>!isEmesso(d)&&!isAnnullato(d)&&!isErrore(d)).length;
  const tot = TUTTI.filter(isEmesso).reduce((a,d)=>a+(Number(d.totale)||0),0);
  document.getElementById('kIncassato').textContent = fmt(tot);
}

function renderLista(){
  const keyOrdine = d => `${d.data||''}T${d.ora||'00:00:00'}`;
  const docs = [..._filtrati].sort((a,b)=>keyOrdine(b).localeCompare(keyOrdine(a)));

  document.getElementById('risultati').textContent =
    `${_filtrati.length} documenti${_filtrati.length!==TUTTI.length?' (filtrati)':''}`;

  const lista = document.getElementById('listaDoc');
  if(!docs.length){
    lista.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">🧾</div>
      <div class="empty-state-title">Nessun documento trovato</div>
      <div class="empty-state-sub">Cambia i filtri o crea un nuovo documento</div>
    </div>`;
    return;
  }
  lista.innerHTML = `
    <div class="doc-row header">
      <div class="dc-cell">Data</div>
      <div class="dc-cell">N° Documento</div>
      <div class="dc-cell">Cliente</div>
      <div class="dc-cell">Targa</div>
      <div class="dc-cell">Veicolo</div>
      <div class="dc-cell">Scontrino fisc.</div>
      <div class="dc-cell" style="text-align:right">Totale</div>
      <div class="dc-cell">Stato</div>
      <div class="dc-cell"></div>
    </div>
    ${docs.map(rigaDoc).join('')}
  `;
}

function rigaDoc(d){
  const tipo = tipoInfo(d.tipo);
  const st = statoInfo(d);
  const veicolo = d.veicolo_modello || '';
  const sc = d.numero_scontrino_fiscale;
  return `<a href="${urlDoc(`id=${d.id}`)}" class="doc-row">
    <div class="dc-cell">
      <div class="dc-data-short">${fmtDataShort(d.data)}</div>
      ${d.ora ? `<div style="font-size:12px;color:var(--text-m);font-family:monospace;margin-top:2px">${String(d.ora).slice(0,5)}</div>` : ''}
    </div>
    <div class="dc-cell">
      <div class="dc-numdoc-bold">${d.numero||'—'}</div>
      <div style="margin-top:4px">
        <span class="tipo-badge" style="background:${tipo.bg};color:${tipo.col}">${tipo.label}</span>
      </div>
    </div>
    <div class="dc-cell"><div class="dc-cliente">${esc(d.cliente_nome)||'—'}</div></div>
    <div class="dc-cell"><div class="dc-targa">${esc(d.veicolo_targa)||'—'}</div></div>
    <div class="dc-cell">
      <div style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(veicolo)||'—'}</div>
    </div>
    <div class="dc-cell">
      <div class="dc-scontrino ${sc?'':'vuoto'}">${sc?esc(sc):'—'}</div>
    </div>
    <div class="dc-cell" style="align-items:flex-end">
      <div class="dc-tot">${Number(d.totale)>0?fmt(d.totale):'—'}</div>
    </div>
    <div class="dc-cell">
      <span class="stato-dot ${st.cls}">${st.label}</span>
    </div>
    <div class="dc-cell" style="align-items:center;justify-content:center" onclick="event.preventDefault()">
      <button onclick="stampaDoc('${d.id}',event)"
        style="background:none;border:1px solid var(--border);border-radius:4px;padding:4px 8px;cursor:pointer;font-size:13px" title="Stampa">🖨</button>
    </div>
  </a>`;
}

function stampaDoc(id, e){
  e.preventDefault(); e.stopPropagation();
  window.open(urlDoc(`id=${id}&print=1`), '_blank');
}

/* ─── Helpers ─── */
function fmtDataShort(d){
  if(!d) return '—';
  const m = String(d).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return `${m[3]}/${m[2]}/${m[1].slice(2)}`;
  return String(d);
}
function fmt(n){
  return '€ '+(Number(n)||0).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function esc(s){
  return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
function toast(msg,tipo=''){
  const w=document.getElementById('toasts');
  const t=document.createElement('div');
  t.className='toast'+(tipo?' '+tipo:'');t.textContent=msg;w.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),350)},3200);
}

init();
</script>
</body>
</html>
