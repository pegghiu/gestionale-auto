<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- ═══ NO-CACHE: forza fetch fresco dell'HTML ad ogni apertura ═══ -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Schede di Lavoro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#E85A00;--accent-d:#C04800;--accent-l:#FFF3EC;
  --dark:#1A1A1A;--surface:#FFF;--bg:#EDEBE6;
  --border:#DEDAD4;--border-dk:#C4C0B8;
  --text:#1A1A1A;--text-m:#706C65;--text-l:#9A9690;
  --ok:#1F7A35;--ok-bg:#E6F5EB;
  --warn:#7A5000;--warn-bg:#FFF8E6;
  --err:#B82020;--err-bg:#FDECEC;
  --info:#1A4FAA;--info-bg:#EBF0FD;
  --purple:#534AB7;--purple-l:#EEEDFE;
  --r:8px;--rs:5px;--sh:0 1px 3px rgba(0,0,0,.07)
}
body{font-family:'Helvetica Neue',Arial,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.5;min-height:100vh}

.hdr{background:var(--dark);color:#FFF;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100}
.hdr-l{display:flex;align-items:center;gap:20px}
.brand{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.hdr-title{font-size:15px;font-weight:600}
.btn-back{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:5px 12px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-back:hover{background:rgba(255,255,255,.08);color:#FFF}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn-p{background:var(--accent);color:#FFF;border-color:var(--accent)}
.btn-p:hover{background:var(--accent-d)}
.btn-s{background:#FFF;color:var(--text);border-color:var(--border)}
.btn-s:hover{background:var(--bg)}
.btn-sm{padding:5px 10px;font-size:12px}

.page{max-width:1200px;margin:0 auto;padding:20px 16px 60px}

/* FILTRI */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.toolbar select,.toolbar input{padding:7px 11px;border:1px solid var(--border);border-radius:var(--rs);font-size:15px;font-family:inherit;background:#FFF;color:var(--text);outline:none}
.toolbar select:focus,.toolbar input:focus{border-color:var(--accent)}
.toolbar input[type=text]{width:220px}

/* KPI MINI */
.kpi-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.kpi-mini{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 16px;box-shadow:var(--sh);display:flex;flex-direction:column;gap:2px;min-width:120px}
.kpi-mini-val{font-size:20px;font-weight:800;letter-spacing:-.02em}
.kpi-mini-lbl{font-size:10px;color:var(--text-m);font-weight:600;text-transform:uppercase;letter-spacing:.06em}

/* LISTA SCHEDE */
.scheda-row{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--sh);margin-bottom:8px;
  display:grid;
  grid-template-columns: 100px 110px 1fr 110px 180px 180px 110px 80px;
  align-items:stretch;gap:0;
  cursor:pointer;transition:box-shadow .15s,transform .12s;
  text-decoration:none;color:inherit;overflow:hidden;
}
.scheda-row .sc-cell{ min-width:0; display:flex; flex-direction:column; justify-content:center; }
.scheda-row .sc-cell.cell-num-scheda{ padding-left:6px; align-items:flex-start; }
.sc-cell.note-cell{ align-items:flex-start; }
.sc-cell.note-cell .note-text{
  font-size:11px; color:var(--text-m); line-height:1.35;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical;
  overflow:hidden; max-width:100%;
}
.sc-numscheda-bold{ font-family:monospace; font-size:15px; font-weight:900; letter-spacing:.04em; white-space:nowrap; }
.sc-data-short{ font-family:monospace; font-size:15px; font-weight:700; }
.scheda-row:not(.header) .sc-cliente{
  font-weight:500; font-size:14px;
  white-space:normal; overflow:hidden;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical;
  line-height:1.25;
}
.scheda-row:not(.header) .sc-targa{ font-size:16px; font-weight:900; }
.scheda-row:not(.header) .sc-tot{ font-size:15px; font-weight:800; }
.scheda-row:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px)}
.scheda-row.header{
  background:#F7F6F3;cursor:default;font-size:10px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;color:var(--text-m);
  transform:none;box-shadow:none;border-bottom:2px solid var(--border-dk);
  border-radius:var(--r) var(--r) 0 0;margin-bottom:0;
}
.scheda-row.header:hover{box-shadow:none;transform:none}
.sc-cell{padding:11px 14px;border-right:1px solid #F0EDE8}
.sc-cell:last-child{border-right:none}
.scheda-row.header .sc-cell{padding:9px 14px}

.sc-num{font-family:monospace;font-size:12px;font-weight:700;letter-spacing:.04em}
.sc-targa{font-weight:800;letter-spacing:.1em;font-size:15px}
.sc-modello{font-size:12px;color:var(--text-m);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-cliente{font-weight:600;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-sub{font-size:11px;color:var(--text-m);margin-top:1px}
.sc-data{font-size:12px;color:var(--text-m);white-space:nowrap}
.sc-tot{font-weight:700;font-size:15px;font-variant-numeric:tabular-nums;text-align:right}

/* BADGE TIPO */
.tipo-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:800;letter-spacing:.06em;font-family:monospace}

/* BADGE STATO */
.stato-dot{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600}
.stato-dot::before{content:'';width:7px;height:7px;border-radius:50%;flex-shrink:0}
.s-bozza::before{background:#9A9690}
.s-aperta::before{background:var(--info)}
.s-pronta::before{background:var(--ok)}
.s-consegnata::before{background:var(--text-l)}

/* SEZIONE PREVENTIVI */
.sezione-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-m);margin:20px 0 8px;display:flex;align-items:center;gap:10px}
.sezione-title::after{content:'';flex:1;height:1px;background:var(--border)}

.empty-state{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:48px;text-align:center;color:var(--text-l)}
.empty-state-icon{font-size:36px;margin-bottom:12px}
.empty-state-title{font-size:15px;font-weight:600;color:var(--text-m);margin-bottom:6px}
.empty-state-sub{font-size:13px}

.toasts{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:300}
.toast{background:var(--dark);color:#FFF;padding:10px 16px;border-radius:var(--r);font-size:15px;animation:fadeUp .22s ease;transition:opacity .3s}
.toast.ok{background:var(--ok)}
.toast.err{background:var(--err)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:800px){
  .scheda-row{grid-template-columns:1fr 1fr;border-radius:var(--r)}
  .sc-cell{border-right:none;border-bottom:1px solid #F0EDE8}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l">
    <span class="brand">Gestione Veicoli</span>
    <span class="hdr-title">Schede di Lavoro</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <a id="btnNuovoPreventivo" href="scheda.html?modo=preventivo" class="btn btn-s" style="font-size:12px">+ Preventivo -S</a>
    <a id="btnNuovaScheda" href="scheda.html" class="btn btn-p">+ Nuova scheda</a>
    <button class="btn-back" onclick="location.href='index.html'">← Menu</button>
  </div>
</header>

<div class="page">

  <!-- TOOLBAR -->
  <div class="toolbar">
    <input type="text" id="cerca" placeholder="Cerca targa, cliente, numero..." oninput="filtra()">
    <select id="fStato" onchange="filtra()">
      <option value="">Tutti gli stati</option>
      <option value="bozza">Accettazione</option>
      <option value="aperta">In lavorazione</option>
      <option value="pronta">Pronta</option>
      <option value="consegnata">Consegnata</option>
    </select>
    <select id="fTipo" onchange="filtra()">
      <option value="">Tutti i tipi</option>
      <option value="aperta">Aperte (senza suffisso)</option>
      <option value="CA">-CA Da pagare</option>
      <option value="CAF">-CAF Conclusa da fatturare</option>
      <option value="CP">-CP Pagata</option>
      <option value="V">-V Vendita</option>
      <option value="R">-R Scontrino</option>
      <option value="F">-F Fatturata</option>
      <option value="FF">-FF Fatturata altro</option>
      <option value="S">-S Preventivo</option>
      <option value="X">-X Flotta</option>
    </select>
    <select id="fTecnico" onchange="filtra()">
      <option value="">Tutti i tecnici</option>
      <option>Davide</option><option>Cristian</option><option>Ivan</option>
      <option>Marco</option><option>Luca</option><option>Andrea</option>
      <option>Bepi</option><option>Stagista</option>
    </select>
    <span id="risultati" style="font-size:12px;color:var(--text-m);margin-left:auto"></span>
  </div>

  <!-- KPI -->
  <div class="kpi-row">
    <div class="kpi-mini"><div class="kpi-mini-val" id="kTot">—</div><div class="kpi-mini-lbl">Totali</div></div>
    <div class="kpi-mini"><div class="kpi-mini-val" style="color:var(--info)" id="kAperte">—</div><div class="kpi-mini-lbl">In lavorazione</div></div>
    <div class="kpi-mini"><div class="kpi-mini-val" style="color:var(--ok)" id="kPronte">—</div><div class="kpi-mini-lbl">Pronte</div></div>
    <div class="kpi-mini"><div class="kpi-mini-val" style="color:var(--warn)" id="kCA">—</div><div class="kpi-mini-lbl">Da pagare (-CA)</div></div>
    <div class="kpi-mini"><div class="kpi-mini-val" style="color:var(--purple)" id="kPrev">—</div><div class="kpi-mini-lbl">Preventivi (-S)</div></div>
  </div>

  <!-- LISTA SCHEDE -->
  <div id="listaSchede"></div>

  <!-- PREVENTIVI (sezione separata) -->
  <div id="sezPreventivi" style="display:none">
    <div class="sezione-title">Preventivi (-S)</div>
    <div id="listaPreventivi"></div>
  </div>

</div>

<div class="toasts" id="toasts"></div>

<script>
const SUPABASE_URL = 'https://iztrrgqkzsovorcmixum.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6dHJyZ3FrenNvdm9yY21peHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDI3NzMsImV4cCI6MjA4OTc3ODc3M30.3IyUCDpFs9x_iSi5C4asodt5_O3F_cwgdb3eBkoQh3U';
const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ═══ CACHE BUSTER ═══════════════════════════════════════════
// Timestamp del caricamento di questa pagina. Appeso a tutti i link
// verso scheda.html per forzare il browser/CDN a servire sempre
// l'ultima versione del file (utile dopo un deploy su GitHub Pages).
const _CB = Date.now();
function urlScheda(params = ''){
  const sep = params ? '&' : '';
  return `scheda.html?${params}${sep}_v=${_CB}`;
}

const TIPI = {
  '':   { label:'Aperta',  col:'#706C65', bg:'#F0EDE8' },
  'CA': { label:'-CA',     col:'#854F0B', bg:'#FAEEDA' },
  'CAF':{ label:'-CAF',    col:'#A8341A', bg:'#FCEAE3' },
  'CP': { label:'-CP',     col:'#1A4FAA', bg:'#EBF0FD' },
  'V':  { label:'-V',      col:'#534AB7', bg:'#EEEDFE' },
  'R':  { label:'-R',      col:'#1F7A35', bg:'#E6F5EB' },
  'F':  { label:'-F',      col:'#1F7A35', bg:'#E6F5EB' },
  'FF': { label:'-FF',     col:'#706C65', bg:'#F0EDE8' },
  'S':  { label:'-S',      col:'#534AB7', bg:'#EEEDFE' },
  'X':  { label:'-X',      col:'#0B6E7A', bg:'#DEF1F4' },
};

// Demo schede — in prod: Supabase
const LS_KEY = 'gestionale_schede'; // fallback locale

let TUTTE = [];
let _filtrate = [];

async function init(){
  // Patch dei link statici nell'header con cache buster
  const a1 = document.getElementById('btnNuovaScheda');
  if (a1) a1.href = urlScheda();
  const a2 = document.getElementById('btnNuovoPreventivo');
  if (a2) a2.href = urlScheda('modo=preventivo');

  await caricaDaSupabase();
  filtra();
}

async function caricaDaSupabase(){
  try {
    const { data, error } = await _sb
      .from('schede_aperte')
      .select('*')
      .order('data', { ascending: false });

    if(error) throw error;
    TUTTE = (data||[]).map(s=>({
      id:      s.id,
      numero:  s.numero,
      tipo:    s.tipo||'',
      stato:   s.stato,
      data:    s.data,            // data manuale della scheda (resta come prima)
      dataAttivita: s.data,        // verrà sovrascritta sotto se troviamo rapportini/DDT
      targa:   s.targa||'',
      modello: s.modello||'',
      cliente: s.cliente_nome||'',
      tecnico: s.tecnico||'',
      tot:     s.totale||0,
      rap:     s.n_rapportini||0,
      note:    s.problema||''
    }));

    // ─── Calcolo data ultima attività per ogni scheda ───
    // Considero SOLO rapportini "veri" inseriti dal dipendente, escludendo
    // quelli "fittizi" creati da auto-confirm-ddt per i ricambi DDT.
    //
    // FIRMA dei rapportini fittizi (creati da edge function auto-confirm-ddt):
    //   - note inizia con "Ricambi DDT", "Ricambi da DDT", "Ricambi da Invio"
    //   - tecnico vuoto, h_totali=0
    // Però i dipendenti POSSONO inserire rapportini con 0 ore (es. solo
    // controllo o consegna), quindi NON uso h_totali come discriminante.
    // Uso solo la firma della note che è univoca degli auto-creati.
    try {
      const { data: rg } = await _sb.from('rapportini_giornalieri')
        .select('scheda_id, data, submitted_at, created_at, tecnico, h_totali, note');
      const dtRap = {};
      const dtRapVis = {};
      (rg||[]).forEach(r=>{
        if (!r.scheda_id) return;

        // FILTRO: salta solo i rapportini chiaramente fittizi (firma nella note)
        const note = String(r.note||'').trim();
        const isFittizioAutoCreato =
          /^Ricambi\s+(DDT|da\s+DDT|da\s+Invio)/i.test(note) &&
          (!r.tecnico || r.tecnico.trim() === '');
        if (isFittizioAutoCreato) return;

        const sub = r.submitted_at || r.created_at || '';
        const giorno = r.data || (sub ? String(sub).slice(0,10) : '');
        if (!giorno) return;
        const ora = sub ? String(sub).slice(11,19) : '00:00:00';
        const chiave = `${giorno}T${ora}`;
        if (!dtRap[r.scheda_id] || chiave > dtRap[r.scheda_id]) {
          dtRap[r.scheda_id] = chiave;
          dtRapVis[r.scheda_id] = giorno;
        }
      });
      TUTTE.forEach(s=>{
        if (dtRap[s.id]) {
          s.dataAttivitaTs = dtRap[s.id];
          s.dataAttivita   = dtRapVis[s.id];
          s.dataFonte      = 'rapportino';
        }
      });

      // 2° tentativo (schede senza rapportini): DDT per targa
      const targheSenzaData = TUTTE.filter(s=>!s.dataFonte && s.targa).map(s=>s.targa);
      if (targheSenzaData.length) {
        const { data: ddt } = await _sb.from('ddt_in_arrivo')
          .select('targa_estratta, email_data')
          .in('targa_estratta', [...new Set(targheSenzaData)]);
        const dtDdt = {};
        const dtDdtVis = {};
        (ddt||[]).forEach(d=>{
          if (!d.targa_estratta || !d.email_data) return;
          // email_data è già un timestamp ISO completo
          const ts = String(d.email_data);
          if (!dtDdt[d.targa_estratta] || ts > dtDdt[d.targa_estratta]) {
            dtDdt[d.targa_estratta] = ts;
            dtDdtVis[d.targa_estratta] = ts.slice(0,10);
          }
        });
        TUTTE.forEach(s=>{
          if (!s.dataFonte && s.targa && dtDdt[s.targa]) {
            s.dataAttivitaTs = dtDdt[s.targa];
            s.dataAttivita   = dtDdtVis[s.targa];
            s.dataFonte      = 'ddt';
          }
        });
      }

      // Fallback finale
      TUTTE.forEach(s=>{
        if (!s.dataAttivitaTs) s.dataAttivitaTs = s.data || '';
      });
    } catch(e2){
      console.warn('Calcolo data attività fallito (non critico):', e2);
    }
  } catch(e){
    console.warn('Supabase non disponibile, uso localStorage:', e.message);
    // Fallback localStorage
    try { TUTTE = JSON.parse(localStorage.getItem(LS_KEY)||'[]'); } catch { TUTTE = []; }
  }
}

async function eliminaScheda(id, e){
  e.preventDefault();
  e.stopPropagation();
  const s = TUTTE.find(x=>x.id===id);
  if(!s) return;
  if(!confirm(`Eliminare la scheda ${s.numero}?\n\nI rapportini e le DDT collegate torneranno disponibili.`)) return;

  try {
    const { error } = await _sb.from('rapportini')
      .update({ stato: 'eliminata' }).eq('id', id);
    if(error) throw error;
  } catch(e){
    // Fallback localStorage
    let schede = JSON.parse(localStorage.getItem(LS_KEY)||'[]');
    schede = schede.filter(x=>x.id!==id);
    localStorage.setItem(LS_KEY, JSON.stringify(schede));
  }

  TUTTE = TUTTE.filter(x=>x.id!==id);
  filtra();
  toast(`Scheda ${s.numero} eliminata`, 'ok');
}

function stampaScheda(id, e){
  e.preventDefault();
  e.stopPropagation();
  window.open(urlScheda(`id=${id}&print=1`), '_blank');
}

function filtra(){
  const q       = document.getElementById('cerca').value.toLowerCase();
  const stato   = document.getElementById('fStato').value;
  const tipo    = document.getElementById('fTipo').value;
  const tecnico = document.getElementById('fTecnico').value;

  _filtrate = TUTTE.filter(s=>{
    if(stato && s.stato!==stato) return false;
    if(tipo==='aperta' && s.tipo!=='') return false;
    if(tipo && tipo!=='aperta' && s.tipo!==tipo) return false;
    if(tecnico && s.tecnico!==tecnico) return false;
    if(q && ![s.numero,s.targa,s.modello,s.cliente,s.note].join(' ').toLowerCase().includes(q)) return false;
    return true;
  });

  renderKpi();
  renderLista();
}

function renderKpi(){
  document.getElementById('kTot').textContent    = TUTTE.length;
  document.getElementById('kAperte').textContent = TUTTE.filter(s=>s.stato==='aperta').length;
  document.getElementById('kPronte').textContent = TUTTE.filter(s=>s.stato==='pronta').length;
  document.getElementById('kCA').textContent     = TUTTE.filter(s=>s.tipo==='CA').length;
  document.getElementById('kPrev').textContent   = TUTTE.filter(s=>s.tipo==='S').length;
}

function renderLista(){
  // Ordino per TIMESTAMP completo dell'ultima attività (data + ora).
  // Così schede dello stesso giorno sono ordinate per orario inserimento,
  // non alfabeticamente per targa o altro.
  const keyOrdine = s => String(s.dataAttivitaTs || s.data || '');
  const schede     = _filtrate.filter(s=>s.tipo!=='S').sort((a,b)=>keyOrdine(b).localeCompare(keyOrdine(a)));
  const preventivi = _filtrate.filter(s=>s.tipo==='S').sort((a,b)=>keyOrdine(b).localeCompare(keyOrdine(a)));

  document.getElementById('risultati').textContent =
    `${_filtrate.length} schede${_filtrate.length!==TUTTE.length?' (filtrate)':''}`;

  const lista = document.getElementById('listaSchede');
  if(!schede.length){
    lista.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">📋</div>
      <div class="empty-state-title">Nessuna scheda trovata</div>
      <div class="empty-state-sub">Cambia i filtri o crea una nuova scheda</div>
    </div>`;
  } else {
    lista.innerHTML = `
      <div class="scheda-row header">
        <div class="sc-cell">Data</div>
        <div class="sc-cell">N° Scheda</div>
        <div class="sc-cell">Cliente</div>
        <div class="sc-cell">Targa</div>
        <div class="sc-cell">Veicolo</div>
        <div class="sc-cell">Note</div>
        <div class="sc-cell" style="text-align:right">Totale</div>
        <div class="sc-cell">Azioni</div>
      </div>
      ${schede.map(s=>rigaScheda(s)).join('')}
    `;
  }

  const sezPrev = document.getElementById('sezPreventivi');
  const listaPrev = document.getElementById('listaPreventivi');
  if(preventivi.length){
    sezPrev.style.display='';
    listaPrev.innerHTML = `
      <div class="scheda-row header">
        <div class="sc-cell">Data</div>
        <div class="sc-cell">N° Preventivo</div>
        <div class="sc-cell">Cliente</div>
        <div class="sc-cell">Targa</div>
        <div class="sc-cell">Veicolo</div>
        <div class="sc-cell">Note</div>
        <div class="sc-cell" style="text-align:right">Totale</div>
        <div class="sc-cell">Azioni</div>
      </div>
      ${preventivi.map(s=>rigaScheda(s)).join('')}
    `;
  } else {
    sezPrev.style.display='none';
  }
}

function rigaScheda(s){
  const tipo = TIPI[s.tipo]||TIPI[''];

  // Estrae HH:MM dall'orario di inserimento, solo se giorno coincide
  let ora = '';
  if (s.dataAttivitaTs && s.dataAttivitaTs.includes('T')) {
    const giornoTs = s.dataAttivitaTs.slice(0,10);
    if (giornoTs === s.dataAttivita) {
      if (s.dataFonte === 'ddt') {
        try {
          const d = new Date(s.dataAttivitaTs);
          if (!isNaN(d.getTime())) {
            ora = d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Rome' });
          }
        } catch(e){}
      } else {
        try {
          const isoUtc = s.dataAttivitaTs.endsWith('Z') ? s.dataAttivitaTs : s.dataAttivitaTs + 'Z';
          const d = new Date(isoUtc);
          if (!isNaN(d.getTime())) {
            ora = d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Rome' });
          }
        } catch(e){}
      }
    }
  }

  // Veicolo: marca + modello uniti
  const veicolo = (s.marca && s.modello) ? `${s.marca} ${s.modello}` : (s.modello || s.marca || '');

  // Data in formato gg/mm/aa
  const fmtDataShort = (d) => {
    if (!d) return '—';
    const m = String(d).match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m) return `${m[3]}/${m[2]}/${m[1].slice(2)}`;
    try {
      const dt = new Date(d);
      if (!isNaN(dt.getTime())) {
        const gg = String(dt.getDate()).padStart(2,'0');
        const mm = String(dt.getMonth()+1).padStart(2,'0');
        const aa = String(dt.getFullYear()).slice(2);
        return `${gg}/${mm}/${aa}`;
      }
    } catch(e){}
    return String(d);
  };

  return `<a href="${urlScheda(`id=${s.id}`)}" class="scheda-row">
    <div class="sc-cell">
      <div class="sc-data-short">${fmtDataShort(s.dataAttivita || s.data)}</div>
      ${ora ? `<div style="font-size:12px;color:var(--text-m);font-family:monospace;margin-top:2px">${ora}</div>` : ''}
      ${s.dataFonte === 'ddt' ? '<div style="font-size:9px;color:var(--text-l);margin-top:1px">via DDT</div>' : ''}
      ${!s.dataFonte ? '<div style="font-size:9px;color:var(--text-l);margin-top:1px">manuale</div>' : ''}
    </div>
    <div class="sc-cell cell-num-scheda">
      <div class="sc-numscheda-bold">${s.numero}</div>
      <div style="margin-top:4px">
        <span class="tipo-badge" style="background:${tipo.bg};color:${tipo.col}">${tipo.label}</span>
      </div>
    </div>
    <div class="sc-cell">
      <div class="sc-cliente">${s.cliente||'—'}</div>
    </div>
    <div class="sc-cell">
      <div class="sc-targa">${s.targa||'—'}</div>
    </div>
    <div class="sc-cell">
      <div style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${veicolo || '—'}</div>
    </div>
    <div class="sc-cell note-cell">
      <div class="note-text">${s.note || '—'}</div>
    </div>
    <div class="sc-cell" style="align-items:flex-end">
      <div class="sc-tot">${s.tot>0?fmt(s.tot):'—'}</div>
    </div>
    <div class="sc-cell" style="display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center" onclick="event.preventDefault()">
      <button onclick="stampaScheda('${s.id}',event)"
        style="background:none;border:1px solid var(--border);border-radius:4px;padding:4px 8px;cursor:pointer;font-size:13px;width:100%" title="Stampa">🖨</button>
      <button onclick="eliminaScheda('${s.id}',event)"
        style="background:none;border:1px solid #FFBBBB;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:13px;color:var(--err);width:100%" title="Elimina">🗑</button>
    </div>
  </a>`;
}

function fmtData(d){
  if(!d) return '—';
  return new Date(d).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'2-digit'});
}
function fmt(n){
  return '€\u00a0'+(n||0).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function toast(msg,tipo=''){
  const w=document.getElementById('toasts');
  const t=document.createElement('div');
  t.className='toast'+(tipo?' '+tipo:'');t.textContent=msg;w.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),350)},3200);
}

init();
</script>
</body>
