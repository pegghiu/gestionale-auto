<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Accesso — Paghera Auto</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#E85A00; --dark:#1A1A1A; --cream:#EDEBE6;
    --err:#c8102e; --line:#dcd8cf;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    font-family:'Inter',system-ui,sans-serif; background:var(--cream); color:var(--dark);
  }
  .card{
    width:100%; max-width:360px; background:#fff; border:1px solid var(--line);
    border-radius:14px; padding:32px 28px; box-shadow:0 8px 30px rgba(0,0,0,.06);
  }
  .brand{font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--orange); font-weight:700; margin-bottom:4px}
  h1{font-size:20px; margin:0 0 22px}
  label{display:block; font-size:12px; font-weight:600; margin:14px 0 6px; color:#555}
  input{
    width:100%; padding:11px 12px; font-size:15px; border:1px solid var(--line);
    border-radius:9px; font-family:inherit; outline:none;
  }
  input:focus{border-color:var(--orange)}
  button{
    width:100%; margin-top:22px; padding:12px; font-size:15px; font-weight:600;
    color:#fff; background:var(--orange); border:none; border-radius:9px; cursor:pointer;
  }
  button:disabled{opacity:.6; cursor:default}
  .msg{margin-top:14px; font-size:13px; min-height:18px}
  .msg.err{color:var(--err)}
  .msg.ok{color:#1a7a3a}
</style>
</head>
<body>
  <form class="card" id="loginForm" autocomplete="on">
    <div class="brand">Paghera Auto</div>
    <h1>Accesso gestionale</h1>
    <label for="email">Email</label>
    <input id="email" type="email" required autocomplete="username" autofocus>
    <label for="password">Password</label>
    <input id="password" type="password" required autocomplete="current-password">
    <button id="btn" type="submit">Entra</button>
    <div class="msg" id="msg"></div>
  </form>

<script>
const SUPABASE_URL = 'https://iztrrgqkzsovorcmixum.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6dHJyZ3FrenNvdm9yY21peHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDI3NzMsImV4cCI6MjA4OTc3ODc3M30.3IyUCDpFs9x_iSi5C4asodt5_O3F_cwgdb3eBkoQh3U';
const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(location.search);
const next = params.get('next') || 'index.html';

// Se già loggato, vai dritto dentro
_sb.auth.getSession().then(function(r){
  if(r.data && r.data.session) location.replace(next);
});

const form = document.getElementById('loginForm');
const msg  = document.getElementById('msg');
const btn  = document.getElementById('btn');

form.addEventListener('submit', async function(e){
  e.preventDefault();
  msg.className = 'msg'; msg.textContent = '';
  btn.disabled = true; btn.textContent = 'Accesso…';
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  try{
    const { error } = await _sb.auth.signInWithPassword({ email: email, password: password });
    if(error) throw error;
    msg.className = 'msg ok'; msg.textContent = 'Accesso riuscito, reindirizzo…';
    location.replace(next);
  }catch(err){
    msg.className = 'msg err';
    msg.textContent = (err && err.message === 'Invalid login credentials')
      ? 'Email o password errati.'
      : ('Errore: ' + (err && err.message ? err.message : 'accesso non riuscito'));
    btn.disabled = false; btn.textContent = 'Entra';
  }
});
</script>
</body>
</html>
