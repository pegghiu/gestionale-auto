<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapportino di Lavoro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#E85A00;--accent-d:#C04800;--accent-l:#FFF3EC;
  --dark:#1A1A1A;--surface:#FFF;--bg:#EDEBE6;
  --border:#DEDAD4;--border-dk:#C4C0B8;
  --text:#1A1A1A;--text-m:#706C65;--text-l:#9A9690;
  --ok:#1F7A35;--ok-bg:#E6F5EB;
  --warn:#7A5000;--warn-bg:#FFF8E6;
  --err:#B82020;--err-bg:#FDECEC;
  --info:#1A4FAA;--info-bg:#EBF0FD;
  --r:8px;--rs:5px;--sh:0 1px 3px rgba(0,0,0,.07)
}
body{font-family:'Helvetica Neue',Arial,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.hdr{background:var(--dark);color:#FFF;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:200}
.hdr-l{display:flex;align-items:center;gap:18px}
.brand{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.doc-num{font-size:15px;font-weight:600}
.scheda-ref{font-size:12px;color:rgba(255,255,255,.5);border-left:1px solid rgba(255,255,255,.15);padding-left:14px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.b-bozza{background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)}
.b-inviato{background:var(--ok-bg);color:var(--ok)}
.btn-back{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:5px 12px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-back:hover{background:rgba(255,255,255,.08);color:#FFF}
.page{max-width:860px;margin:0 auto;padding:20px 16px 90px;display:flex;flex-direction:column;gap:14px}
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden}
.ch{padding:11px 20px;border-bottom:1px solid var(--border);background:#F7F6F3;display:flex;align-items:center;justify-content:space-between;gap:12px}
.ct{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-m)}
.cb{padding:16px 20px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.gt{margin-top:12px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-m)}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--rs);font-size:14px;font-family:inherit;color:var(--text);background:#FFF;outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,90,0,.12)}
input[readonly]{background:var(--bg);color:var(--text-m);cursor:default}
textarea{resize:vertical;min-height:64px;line-height:1.6}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--accent);color:#FFF;border-color:var(--accent)}
.btn-p:hover{background:var(--accent-d)}
.btn-s{background:#FFF;color:var(--text);border-color:var(--border)}
.btn-s:hover{background:var(--bg)}
.btn-g{background:transparent;color:var(--text-m);border-color:transparent;padding:6px 8px}
.btn-g:hover{background:var(--bg);color:var(--text)}
.btn-g.del{color:var(--err)}
.btn-g.del:hover{background:var(--err-bg)}
.btn-ok{background:var(--ok);color:#FFF;border-color:var(--ok)}
.btn-ok:hover{opacity:.88}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-lg{padding:11px 24px;font-size:14px;border-radius:var(--r)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-m);padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);background:#F7F6F3;white-space:nowrap}
.tbl th.r{text-align:right}
.tbl td{padding:6px 6px;vertical-align:middle;border-bottom:1px solid #F0EDE8}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl td input,.tbl td select{padding:7px 9px;font-size:14px;border-radius:4px}
.ore-tot{font-variant-numeric:tabular-nums;font-weight:700;font-size:14px;color:var(--accent);text-align:right;padding:10px 14px;border-top:1px solid var(--border);background:#F7F6F3}
.ric-listino{background:var(--bg);color:var(--ok);cursor:default;font-weight:700;text-align:right}
.riepilogo{background:var(--dark);color:#FFF;border-radius:var(--r);padding:18px 24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.riepilogo-item{display:flex;flex-direction:column;gap:4px}
.riepilogo-val{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.riepilogo-lbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.45)}
.fbar{position:fixed;bottom:0;left:0;right:0;background:#FFF;border-top:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,.07)}
.fbar-stato{font-size:12px;color:var(--text-m)}
.fbar-stato.saved{color:var(--ok)}
.toasts{position:fixed;bottom:68px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:300}
.toast{background:var(--dark);color:#FFF;padding:10px 16px;border-radius:var(--r);font-size:13px;max-width:340px;animation:fadeUp .22s ease;transition:opacity .3s}
.toast.ok{background:var(--ok)}
.toast.err{background:var(--err)}
.toast.info{background:var(--info)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:#FFF;border:1px solid var(--border);border-radius:var(--rs);box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:100;max-height:220px;overflow-y:auto;display:none}
.ac-list.show{display:block}
.ac-item{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #F5F3EE}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--bg)}
.ac-cod{font-size:10px;color:var(--text-l);font-family:monospace;margin-right:6px}
.ac-qta{float:right;font-size:11px;color:var(--text-m)}
.warn-qta{font-size:10px;color:var(--err);margin-top:2px}
@media(max-width:600px){.g4,.riepilogo{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l">
    <span class="brand">Rapportino</span>
    <span class="doc-num" id="hNum">Nuovo</span>
    <span class="scheda-ref" id="hScheda" style="display:none"></span>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="badge b-bozza" id="hBadge">Bozza</span>
    <button class="btn-back" onclick="goBack()">← Indietro</button>
  </div>
</header>

<div class="page">

  <!-- INTESTAZIONE -->
  <div class="card">
    <div class="ch"><span class="ct">Dati rapportino</span></div>
    <div class="cb">
      <div class="g4">
        <div class="field">
          <label>Data *</label>
          <input type="date" id="rData" oninput="R.data=this.value;dirty()">
        </div>
        <div class="field">
          <label>Targa veicolo</label>
          <input type="text" id="rTarga" readonly style="font-weight:700;letter-spacing:.12em;font-size:15px">
        </div>
        <div class="field">
          <label>Modello</label>
          <input type="text" id="rModello" readonly>
        </div>
        <div class="field">
          <label>N° rapportino</label>
          <input type="text" id="rNumero" readonly>
        </div>
      </div>
      <div class="field gt">
        <label>Descrizione lavori del giorno</label>
        <textarea id="rNote" rows="2"
          placeholder="Es. Sostituzione filtri, diagnosi centralina, revisione freni anteriori..."
          oninput="R.note=this.value;dirty()"></textarea>
      </div>
    </div>
  </div>

  <!-- ORE DI LAVORO -->
  <div class="card">
    <div class="ch">
      <span class="ct">Ore di lavoro</span>
      <button class="btn btn-s btn-sm" onclick="addOra()">+ Operatore</button>
    </div>
    <table class="tbl" id="tblOre">
      <thead><tr>
        <th style="width:180px">Operatore</th>
        <th class="r" style="width:100px">Ore lavorate</th>
        <th class="r" style="width:100px">Tariffa €/h</th>
        <th class="r" style="width:100px">Importo</th>
        <th style="width:36px"></th>
      </tr></thead>
      <tbody id="oreBody"></tbody>
    </table>
    <div class="ore-tot" id="oreTot">0h · € 0,00</div>
  </div>

  <!-- RICAMBI DA MAGAZZINO -->
  <div class="card">
    <div class="ch">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="ct">Ricambi prelevati da magazzino</span>
        <span style="font-size:11px;color:var(--text-m)" id="ricCount"></span>
      </div>
      <button class="btn btn-s btn-sm" onclick="addRicambio()">+ Ricambio</button>
    </div>
    <div style="overflow-x:auto">
      <table class="tbl" style="min-width:640px" id="tblRic">
        <thead><tr>
          <th>Articolo (cerca per nome o codice)</th>
          <th style="width:140px">Codice</th>
          <th class="r" style="width:65px">Qtà</th>
          <th class="r" style="width:100px">P. listino</th>
          <th class="r" style="width:90px">Subtot.</th>
          <th style="width:36px"></th>
        </tr></thead>
        <tbody id="ricBody"></tbody>
      </table>
    </div>
    <div style="padding:10px 20px;border-top:1px solid var(--border);background:#F7F6F3;text-align:right;font-size:13px">
      Totale ricambi: <strong id="ricTot" style="font-size:15px;margin-left:6px">€ 0,00</strong>
    </div>
  </div>

  <!-- NOTE LIBERE -->
  <div class="card">
    <div class="ch"><span class="ct">Note libere</span></div>
    <div class="cb">
      <textarea id="rNoteLib" rows="3"
        placeholder="Annotazioni aggiuntive, problemi riscontrati, indicazioni per il giorno successivo..."
        oninput="R.note_libere=this.value;dirty()"
        style="min-height:80px"></textarea>
    </div>
  </div>

  <!-- RIEPILOGO -->
  <div class="riepilogo">
    <div class="riepilogo-item">
      <div class="riepilogo-val" id="sTotH">0h</div>
      <div class="riepilogo-lbl">Ore lavorate</div>
    </div>
    <div class="riepilogo-item">
      <div class="riepilogo-val" id="sTotRic">€ 0</div>
      <div class="riepilogo-lbl">Ricambi</div>
    </div>
    <div class="riepilogo-item">
      <div class="riepilogo-val" id="sTotale">€ 0</div>
      <div class="riepilogo-lbl">Totale giornata</div>
    </div>
  </div>

</div>

<div class="toasts" id="toasts"></div>

<div class="fbar">
  <div class="fbar-stato" id="fStato">Bozza</div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-s" onclick="salva()">Salva</button>
    <button class="btn btn-ok btn-lg" id="btnInvia" onclick="invia()">✓ Invia alla scheda →</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://iztrrgqkzsovorcmixum.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6dHJyZ3FrenNvdm9yY21peHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDI3NzMsImV4cCI6MjA4OTc3ODc3M30.3IyUCDpFs9x_iSi5C4asodt5_O3F_cwgdb3eBkoQh3U';
const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Operatori con tariffa oraria ──────────────────────────
const OPERATORI = [
  {nome:'Davide',   tariffa:45},
  {nome:'Cristian', tariffa:45},
  {nome:'Ivan',     tariffa:45},
  {nome:'Marco',    tariffa:45},
  {nome:'Luca',     tariffa:42},
  {nome:'Stagista', tariffa:20},
];

// ── Magazzino demo (in prod: Supabase) ────────────────────
let MAG = [
  {id:1,codice:'FIL-OLI-001',descrizione:'Filtro olio Bosch W712/73',         um:'NR',qta:8, prezzo_vendita:18.50},
  {id:2,codice:'FIL-ARI-002',descrizione:'Filtro aria abitacolo Ducato',       um:'NR',qta:2, prezzo_vendita:24.00},
  {id:3,codice:'OLI-5W30-5L',descrizione:'Olio motore 5W30 — 5 litri',        um:'L', qta:35,prezzo_vendita:38.00},
  {id:4,codice:'PAR-FRONT-DX',descrizione:'Pastiglie freno anteriori DX',      um:'NR',qta:0, prezzo_vendita:45.00},
  {id:5,codice:'CIN-DIST-001',descrizione:'Kit distribuzione + pompa acqua',   um:'NR',qta:1, prezzo_vendita:160.00},
  {id:6,codice:'SEN-FRIZ-001',descrizione:'Sensore disinn. frizione Panda MJTD',um:'NR',qta:3,prezzo_vendita:68.00},
];

// ── Stato ─────────────────────────────────────────────────
const R = {
  id:null,numero:'',data:'',note:'',note_libere:'',
  targa:'',modello:'',
  _scheda_id:null,_scheda_num:null,_dirty:false,
  ore:[],     // {_id,operatore,tariffa,ore}
  ricambi:[], // {_id,art_id,codice,descrizione,um,qty,prezzo_listino}
};
let _id = 1;

// ── Init ──────────────────────────────────────────────────
function init(){
  const oggi = new Date().toISOString().slice(0,10);
  R.data = oggi;
  document.getElementById('rData').value = oggi;
  const annoBreve = String(new Date().getFullYear()).slice(-2);
  R.numero = `${annoBreve}/${String(Math.floor(Math.random()*9000)+1000)}`;
  document.getElementById('rNumero').value = R.numero;
  document.getElementById('hNum').textContent = R.numero;

  const p = new URLSearchParams(window.location.search);
  if(p.get('from')==='scheda') caricaDaScheda();

  addOra(); // prima riga vuota
}

// ── Prefill da scheda ─────────────────────────────────────
function caricaDaScheda(){
  const raw = sessionStorage.getItem('rapportino_prefill');
  if(!raw) return;
  try{
    const d = JSON.parse(raw);
    sessionStorage.removeItem('rapportino_prefill');
    R._scheda_id  = d.scheda_id;
    R._scheda_num = d.scheda_num;
    R.targa   = d.targa  ||'';
    R.modello = d.modello||'';
    document.getElementById('rTarga').value   = R.targa;
    document.getElementById('rModello').value = R.modello;
    const ref = document.getElementById('hScheda');
    ref.textContent = 'Scheda: '+(d.scheda_num||d.scheda_id||'');
    ref.style.display = '';
    document.getElementById('btnInvia').textContent =
      '✓ Invia alla scheda '+(d.scheda_num||'')+' →';

    // Carica articolo da magazzino se passato
    // TODO Supabase: carica MAG aggiornato
    toast('Rapportino per scheda '+(d.scheda_num||''),'info');
  }catch(e){console.error(e);}
}

// ── ORE DI LAVORO ─────────────────────────────────────────
function addOra(d={}){
  const def = OPERATORI[0];
  R.ore.push({_id:_id++, operatore:d.operatore||def.nome, tariffa:d.tariffa||def.tariffa, ore:d.ore||0});
  renderOre();
  setTimeout(()=>document.getElementById('ore-h-'+(R.ore[R.ore.length-1]._id))?.focus(),40);
}

function removeOra(id){ R.ore=R.ore.filter(o=>o._id!==id); renderOre(); aggiornaTot(); dirty(); }

function updOra(id,k,v){
  const o=R.ore.find(o=>o._id===id); if(!o)return;
  if(k==='operatore'){
    o.operatore=v;
    const op=OPERATORI.find(p=>p.nome===v);
    if(op){o.tariffa=op.tariffa;}
    renderOre();
  } else { o[k]=parseFloat(v)||0; }
  aggiornaTot(); dirty();
}

function renderOre(){
  const tbody=document.getElementById('oreBody');
  tbody.innerHTML='';
  R.ore.forEach(o=>{
    const imp=o.ore*o.tariffa;
    const tr=document.createElement('tr');
    const opts=OPERATORI.map(p=>`<option value="${p.nome}" ${o.operatore===p.nome?'selected':''}>${p.nome}</option>`).join('');
    tr.innerHTML=`
      <td style="padding:5px 6px">
        <select style="width:100%;font-size:14px;padding:7px 9px"
          onchange="updOra(${o._id},'operatore',this.value)">${opts}</select>
      </td>
      <td style="padding:5px 6px">
        <input type="number" id="ore-h-${o._id}" value="${o.ore||''}"
          min="0" step="0.5" placeholder="0"
          oninput="updOra(${o._id},'ore',this.value)"
          style="text-align:right;width:88px;font-size:15px;font-weight:700">
      </td>
      <td style="padding:5px 6px">
        <input type="number" value="${o.tariffa}" min="0" step="1"
          oninput="updOra(${o._id},'tariffa',this.value)"
          style="text-align:right;width:82px;font-size:13px">
      </td>
      <td style="padding:5px 12px;text-align:right;font-weight:700;font-size:14px;font-variant-numeric:tabular-nums">
        ${fmt(imp)}
      </td>
      <td style="padding:5px 4px;text-align:center">
        <button class="btn btn-g btn-sm del" onclick="removeOra(${o._id})">✕</button>
      </td>`;
    tbody.appendChild(tr);
  });
}

// ── RICAMBI ───────────────────────────────────────────────
function addRicambio(art=null){
  const riga={_id:_id++, art_id:art?.id||null, codice:art?.codice||'',
    descrizione:art?.descrizione||'', um:art?.um||'NR',
    qty:1, prezzo_listino:art?.prezzo_vendita||0};
  R.ricambi.push(riga);
  renderRicambi();
  setTimeout(()=>document.getElementById('ric-s-'+riga._id)?.focus(),40);
}

function removeRic(id){ R.ricambi=R.ricambi.filter(r=>r._id!==id); renderRicambi(); aggiornaTot(); dirty(); }

function updRicQty(id,v){
  const r=R.ricambi.find(r=>r._id===id); if(!r)return;
  r.qty=parseFloat(v)||0;
  const sub=document.getElementById('ric-sub-'+id);
  if(sub)sub.textContent=fmt(r.qty*r.prezzo_listino);
  aggiornaTot(); dirty();
}

function renderRicambi(){
  const tbody=document.getElementById('ricBody');
  tbody.innerHTML='';
  R.ricambi.forEach(r=>{
    const artMag=MAG.find(a=>a.id===r.art_id);
    const scarso=artMag&&artMag.qta<r.qty;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td style="padding:5px 6px;min-width:200px">
        <div class="ac-wrap">
          <input type="text" id="ric-s-${r._id}" value="${r.descrizione}"
            placeholder="Cerca per nome o codice..."
            oninput="cercaArt(${r._id},this.value)" style="width:100%">
          <div class="ac-list" id="ac-${r._id}"></div>
        </div>
        ${scarso?`<div class="warn-qta">⚠ Solo ${artMag.qta} ${artMag.um} disponibili</div>`:''}
      </td>
      <td style="padding:5px 6px">
        <input type="text" value="${r.codice}" readonly
          style="width:92px;font-family:monospace;font-size:11px;background:var(--bg);color:var(--text-m)">
      </td>
      <td style="padding:5px 6px">
        <input type="number" value="${r.qty}" min="0.01" step="1"
          oninput="updRicQty(${r._id},this.value)"
          style="text-align:right;width:56px">
      </td>
      <td style="padding:5px 8px;text-align:right">
        <input type="number" value="${r.prezzo_listino}" readonly class="ric-listino"
          style="width:90px;font-size:13px;padding:6px 8px">
      </td>
      <td style="padding:5px 12px;text-align:right;font-weight:700" id="ric-sub-${r._id}">
        ${fmt(r.qty*r.prezzo_listino)}
      </td>
      <td style="padding:5px 4px;text-align:center">
        <button class="btn btn-g btn-sm del" onclick="removeRic(${r._id})">✕</button>
      </td>`;
    tbody.appendChild(tr);
  });
  const n=R.ricambi.length;
  document.getElementById('ricCount').textContent=n?n+(n===1?' ricambio':' ricambi'):'';
}

// ── Autocomplete magazzino ────────────────────────────────
function cercaArt(rid,q){
  const list=document.getElementById('ac-'+rid);
  if(q.length<2){list.classList.remove('show');return;}
  const ql=q.toLowerCase();
  // TODO Supabase: _sb.from('articoli').select().ilike(...)
  const res=MAG.filter(a=>a.descrizione.toLowerCase().includes(ql)||a.codice.toLowerCase().includes(ql)).slice(0,8);
  if(!res.length){list.classList.remove('show');return;}
  list.innerHTML=res.map(a=>`
    <div class="ac-item" onclick="selArt(${rid},${a.id})">
      <span class="ac-cod">${a.codice}</span>${a.descrizione}
      <span class="ac-qta">${a.qta} ${a.um}</span>
    </div>`).join('');
  list.classList.add('show');
}

function selArt(rid,artId){
  const art=MAG.find(a=>a.id===artId); if(!art)return;
  const r=R.ricambi.find(r=>r._id===rid); if(!r)return;
  r.art_id=art.id; r.codice=art.codice;
  r.descrizione=art.descrizione; r.um=art.um;
  r.prezzo_listino=art.prezzo_vendita;
  document.getElementById('ac-'+rid).classList.remove('show');
  renderRicambi(); aggiornaTot(); dirty();
}

document.addEventListener('click',e=>{
  if(!e.target.closest('.ac-wrap'))
    document.querySelectorAll('.ac-list').forEach(l=>l.classList.remove('show'));
});

// ── Totali ────────────────────────────────────────────────
function aggiornaTot(){
  const hTot=R.ore.reduce((s,o)=>s+o.ore,0);
  const tOre=R.ore.reduce((s,o)=>s+o.ore*o.tariffa,0);
  const tRic=R.ricambi.reduce((s,r)=>s+r.qty*r.prezzo_listino,0);
  const tot=tOre+tRic;

  document.getElementById('oreTot').textContent=fmtH(hTot)+' · '+fmt(tOre);
  document.getElementById('ricTot').textContent=fmt(tRic);
  document.getElementById('sTotH').textContent=fmtH(hTot);
  document.getElementById('sTotRic').textContent='€ '+Math.round(tRic);
  document.getElementById('sTotale').textContent='€ '+Math.round(tot);
  R._h=hTot; R._tOre=tOre; R._tRic=tRic; R._tot=tot;
}

// ── Salva / Invia ─────────────────────────────────────────
function salva(){
  console.log('💾',buildPayload());
  R._dirty=false;
  document.getElementById('fStato').textContent='✓ Salvato';
  document.getElementById('fStato').className='fbar-stato saved';
  toast('Salvato','ok');
}

function invia(){
  if(!R.data){toast('Inserisci la data','err');return;}

  // Forza lettura valori dai campi prima di costruire il payload
  document.querySelectorAll('[id^="ore-h-"]').forEach(inp=>{
    const id = parseInt(inp.id.replace('ore-h-',''));
    updOra(id,'ore',inp.value);
  });

  const ok=R.ore.some(o=>o.ore>0)||R.ricambi.length>0;
  if(!ok){toast('Aggiungi almeno un\'ora o un ricambio','err');return;}
  if(!confirm('Inviare il rapportino alla scheda di lavoro?'))return;

  const payload = buildPayload();

  // Salva in sessionStorage — la scheda lo legge al focus
  sessionStorage.setItem('rapportino_in_arrivo', JSON.stringify(payload));

  // Prova anche via window.opener (funziona se stessa origine)
  if(window.opener && !window.opener.closed){
    try{
      window.opener.riceviRapportino(payload);
      sessionStorage.removeItem('rapportino_in_arrivo'); // già consegnato
    }catch(e){ console.warn('opener non disponibile, uso sessionStorage'); }
  }

  document.getElementById('hBadge').className='badge b-inviato';
  document.getElementById('hBadge').textContent='Inviato';
  toast('Inviato alla scheda ✓','ok');

  // Torna alla scheda di lavoro
  if(window.opener && !window.opener.closed){
    window.opener.focus();
    setTimeout(()=>window.close(), 1000);
  } else if(R._scheda_id){
    // Nessun opener — naviga direttamente alla scheda
    setTimeout(()=>{ window.location.href = `scheda.html?id=${R._scheda_id}`; }, 900);
  } else {
    setTimeout(()=>{ window.location.href = 'schede.html'; }, 900);
  }
  return;
}

function buildPayload(){
  return {
    _id:     R.id||Date.now(),
    numero:  R.numero,
    data:    R.data,
    targa:   R.targa,
    modello: R.modello,
    note:    R.note,
    note_libere: R.note_libere,
    scheda_id: R._scheda_id,
    ore:     R.ore.map(({_id,...r})=>r),
    ricambi: R.ricambi.map(({_id,...r})=>r),
    h_totali:R._h||0,
    tot_ore: R._tOre||0,
    tot_ric: R._tRic||0,
    totale:  R._tot||0,
    // Elementi aggregati per scheda
    elementi:[
      ...R.ore.filter(o=>o.ore>0).map(o=>({
        tipo:'manodopera',codice:'',
        descrizione:'Manodopera '+o.operatore+' ('+fmtH(o.ore)+')',
        qty:o.ore,prezzo:o.tariffa,iva_pct:22
      })),
      ...R.ricambi.map(r=>({
        tipo:'ricambio',codice:r.codice,descrizione:r.descrizione,
        qty:r.qty,prezzo:r.prezzo_listino,iva_pct:22
      }))
    ]
  };
}

function goBack(){
  if(window.opener&&!window.opener.closed)window.close();
  else window.location.href='index.html';
}
function dirty(){R._dirty=true;document.getElementById('fStato').textContent='Modifiche non salvate';document.getElementById('fStato').className='fbar-stato';}
function fmt(n){return '€\u00a0'+(n||0).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtH(h){return Number.isInteger(h)?h+'h':h.toFixed(1).replace('.',',')+'h';}
function toast(msg,tipo=''){const w=document.getElementById('toasts');const t=document.createElement('div');t.className='toast'+(tipo?' '+tipo:'');t.textContent=msg;w.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),350)},3200);}
window.addEventListener('beforeunload',e=>{if(R._dirty){e.preventDefault();e.returnValue='';}});

init();
</script>
